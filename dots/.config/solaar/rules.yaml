%YAML 1.3
---
- Rule:
  - Feature: None
  - Report: 0
  - TestBytes: [0, 1, 1, 11]
  - Set:
    - null
    - backlight
    - 255
- Rule:
  - Feature: None
  - Report: 0
  - TestBytes: [0, 1, 11, 100]
  - Set:
    - null
    - backlight
    - 0
...
---
- Rule:
  - MouseGesture: []
  - KeyPress:
    - [Super_L, space]
    - click
- Rule:
  - MouseGesture: Mouse Up
  - KeyPress:
    - [Super_L, w]
    - click
- Rule:
  - MouseGesture: Mouse Down
  - KeyPress:
    - [Super_L, n]
    - click
- Rule:
  - MouseGesture: Mouse Left
  - KeyPress:
    - [Control_L, Super_L, Right]
    - click
- Rule:
  - MouseGesture: Mouse Right
  - KeyPress:
    - [Control_L, Super_L, Left]
    - click
...
---
- Rule:
  - Key: [Mission Control/Task View, pressed]
  - KeyPress:
    - [Super_L, w]
    - click
- Rule:
  - Key: [Dashboard Launchpad/Action Center, pressed]
  - KeyPress:
    - [Super_L, space]
    - click
...
