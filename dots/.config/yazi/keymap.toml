[[mgr.prepend_keymap]]
on   = "<C-s>"
run  = "plugin kdeconnect-send"
desc = "Send selected files via KDE Connect"

[[mgr.prepend_keymap]]
on   = "M"
run  = "plugin mount"

[[mgr.prepend_keymap]]
on   = ["R", "b"]
run  = "plugin recycle-bin"
desc = "Open Recycle Bin menu"

[[mgr.prepend_keymap]]
on   = "u"
run  = "plugin restore"
desc = "Restore last delete files/folders"

[[mgr.prepend_keymap]]
on   = "y"
run  = ["yank", "plugin clipboard -- --action=copy"]

[[mgr.prepend_keymap]]
on   = "<C-p>"
run  = "plugin clipboard -- --action=paste"
